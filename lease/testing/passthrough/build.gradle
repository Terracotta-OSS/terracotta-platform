plugins {
  id 'org.terracotta.build.convention.java-library'
  id 'org.terracotta.build.deploy'
  id 'biz.aQute.bnd.builder'
}

dependencies {
  api project(':lease:client')
  implementation "org.terracotta:passthrough-server:$terracottaRuntimeVersion"
  compileOnly "org.terracotta:client-api:$terracottaApisVersion"
}

deploy {
  groupId = 'org.terracotta'
  artifactId = 'passthrough-leased-connection-api'
  name = 'Lease Passthrough Support'
}
